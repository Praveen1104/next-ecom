openapi: 3.0.0
info:
  title: Myntra Clone E-commerce API
  description: Enterprise-grade e-commerce backend API
  version: 1.0.0
servers:
  - url: http://localhost:8000
    description: Local development server
paths:
  /api/v1/health:
    get:
      summary: Healthcheck
      responses:
        '200':
          description: Server is healthy
  /api/v1/users/register:
    post:
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName:
                  type: string
                lastName:
                  type: string
                email:
                  type: string
                password:
                  type: string
      responses:
        '201':
          description: User created successfully
  /api/v1/products:
    get:
      summary: Get all products
      parameters:
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: category
          schema:
            type: string
      responses:
        '200':
          description: A list of products with pagination info
